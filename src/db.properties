# ====================================================================
# HAL HR SENIORITY SYSTEM - DATABASE CONFIGURATION PROPERTIES
# ====================================================================
# This file stores database connection details and table/column schema.
# You can edit this file to map to HAL's real tables on-site without recompiling.

# 1. Oracle JDBC Connection Configuration
db.driver=oracle.jdbc.driver.OracleDriver
db.url=jdbc:oracle:thin:@localhost:1521:XE
db.username=system
db.password=admin

# 2. Database Schema Table Names
table.employees=MST_EMPLOYEES
table.promotions=TRN_PROMOTIONS

# 3. Employee Master Table Column Mapping (MST_EMPLOYEES)
col.emp.id=employee_id
col.emp.name=employee_name
col.emp.grade=grade
col.emp.level=emp_level
col.emp.promo_date=promotion_date
col.emp.doj=date_of_joining
col.emp.dob=date_of_birth
col.emp.dept=department
col.emp.desig=designation

# 4. Promotion History Table Column Mapping (TRN_PROMOTIONS)
col.promo.id=promotion_id
col.promo.emp_id=employee_id
col.promo.grade=grade
col.promo.date=promotion_date
col.promo.order_num=order_number
col.promo.pos_code=pos_code
col.promo.valid_from=valid_from
col.promo.valid_to=valid_to
col.promo.is_primary=is_primary
col.promo.assignment_type=assignment_type
